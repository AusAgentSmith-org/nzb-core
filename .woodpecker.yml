when:
  - event: push
    branch: main
  - event: manual

steps:
  - name: debug
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - echo "env token length $(echo -n $GIT_AUTH_TOKEN | wc -c)"
      - env | grep -i auth | head -5 || echo "no auth vars"
      - env | grep -i git | head -5 || echo "no git vars"
      - env | wc -l
